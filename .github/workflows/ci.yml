name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cargo test + pytest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Testes do core Rust (puro, sem Python).
      - name: cargo test
        run: cargo test --verbose

      # maturin develop exige um virtualenv ativo. O setup-python não cria um,
      # então criamos o .venv e o exportamos para os próximos steps via
      # GITHUB_ENV/GITHUB_PATH (cada step roda num shell novo).
      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest

      # Compila a extensão e instala no .venv.
      - name: maturin develop
        run: maturin develop

      - name: pytest
        run: pytest -q

  build-wheels:
    name: build wheels (abi3)
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist
